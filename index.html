<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章管理后台 - 知识库小程序</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

  /* 登录页 */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea, #764ba2); }
  .login-card { background: #fff; border-radius: 20px; padding: 48px 40px; width: 400px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; }
  .login-card h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 8px; }
  .login-card p { color: #888; font-size: 14px; margin-bottom: 32px; }
  .login-card input { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; outline: none; margin-bottom: 16px; transition: border-color 0.2s; }
  .login-card input:focus { border-color: #6366f1; }
  .login-card button { width: 100%; padding: 14px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .login-card button:hover { opacity: 0.9; }
  .login-error { color: #e74c3c; font-size: 13px; margin-top: 12px; display: none; }

  /* 管理后台 */
  .admin-wrap { display: none; min-height: 100vh; }
  .admin-wrap.show { display: block; }

  /* 顶部导航 */
  .topbar { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(99,102,241,0.3); }
  .topbar h2 { font-size: 18px; font-weight: 600; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .topbar .badge { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 13px; }
  .topbar button { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; }
  .topbar button:hover { background: rgba(255,255,255,0.25); }

  /* 主内容 */
  .main { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* 操作栏 */
  .action-bar { background: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .action-bar button { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-primary:hover { background: #4f46e5; }
  .btn-success { background: #10b981; color: #fff; }
  .btn-success:hover { background: #059669; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-secondary { background: #e2e8f0; color: #333; }
  .btn-secondary:hover { background: #cbd5e1; }
  .action-bar .sync-status { margin-left: auto; font-size: 13px; color: #888; }

  /* 文章列表 */
  .article-list { background: #fff; border-radius: 12px; overflow: hidden; }
  .article-item { display: flex; align-items: center; padding: 16px 24px; border-bottom: 1px solid #f1f5f9; gap: 16px; transition: background 0.15s; }
  .article-item:hover { background: #f8fafc; }
  .article-item:last-child { border-bottom: none; }
  .article-info { flex: 1; min-width: 0; }
  .article-title { font-size: 15px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .article-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .meta-tag { padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .tag-category { background: #eef2ff; color: #6366f1; }
  .tag-free { background: #dcfce7; color: #16a34a; }
  .tag-paid { background: #fef3c7; color: #d97706; }
  .meta-time { font-size: 12px; color: #999; }
  .meta-id { font-size: 11px; color: #ccc; font-family: monospace; }
  .article-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .article-actions button { padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid; }
  .btn-edit { background: #fff; color: #6366f1; border-color: #6366f1; }
  .btn-edit:hover { background: #6366f1; color: #fff; }
  .btn-del { background: #fff; color: #ef4444; border-color: #ef4444; }
  .btn-del:hover { background: #ef4444; color: #fff; }
  .empty { padding: 60px; text-align: center; color: #999; font-size: 15px; }

  /* 弹窗 */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 800px; max-height: 90vh; display: flex; flex-direction: column; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 17px; color: #1a1a2e; }
  .modal-close { width: 32px; height: 32px; border-radius: 8px; border: none; background: #f1f5f9; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  .modal-body { flex: 1; overflow-y: auto; padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid #f1f5f9; display: flex; gap: 12px; justify-content: flex-end; }
  .modal-footer button { padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; font-weight: 500; }

  /* 表单 */
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 14px; font-weight: 600; color: #333; margin-bottom: 8px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #6366f1; }
  .form-group textarea { min-height: 120px; resize: vertical; line-height: 1.6; }
  .form-row { display: flex; gap: 16px; }
  .form-row .form-group { flex: 1; }
  .form-hint { font-size: 12px; color: #888; margin-top: 6px; }

  /* 富文本工具栏 */
  .rich-toolbar { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
  .rich-toolbar button { padding: 6px 10px; border: 1px solid #e2e8f0; background: #fff; border-radius: 4px; font-size: 13px; cursor: pointer; }
  .rich-toolbar button:hover { background: #f1f5f9; }
  .rich-toolbar button.active { background: #6366f1; color: #fff; border-color: #6366f1; }

  /* Toast */
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 14px; z-index: 9999; transition: transform 0.3s ease; pointer-events: none; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #10b981; }
  .toast.error { background: #ef4444; }

  /* 加载 */
  .loading-mask { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .loading-mask.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: #6366f1; font-weight: 500; }

  /* 预览区 */
  .preview-box { background: #f8fafc; border: 2px dashed #e2e8f0; border-radius: 8px; padding: 16px; min-height: 100px; font-size: 14px; line-height: 1.8; max-height: 300px; overflow-y: auto; }

  /* 确认框 */
  .confirm-box { text-align: center; padding: 20px 0; }
  .confirm-box p { font-size: 15px; color: #333; margin-bottom: 24px; }
</style>
</head>
<body>

<!-- 登录页 -->
<div class="login-wrap" id="loginPage">
  <div class="login-card">
    <h1>🔐 文章管理后台</h1>
    <p>知识库小程序 · GitHub 数据源</p>
    <input type="password" id="passwordInput" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登 录</button>
    <div class="login-error" id="loginError">密码错误，请重试</div>
  </div>
</div>

<!-- 管理后台 -->
<div class="admin-wrap" id="adminPage">
  <div class="topbar">
    <h2>📚 文章管理后台</h2>
    <div class="topbar-right">
      <span class="badge" id="articleCount">共 0 篇</span>
      <button onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="main">
    <div class="action-bar">
      <button class="btn-primary" onclick="openAddModal()">➕ 添加文章</button>
      <button class="btn-success" onclick="syncArticles()">🔄 刷新列表</button>
      <span class="sync-status" id="syncStatus"></span>
    </div>

    <div class="article-list" id="articleList">
      <div class="empty">点击上方「刷新列表」加载文章</div>
    </div>
  </div>
</div>

<!-- 添加/编辑弹窗 -->
<div class="modal-overlay" id="articleModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">添加文章</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label>标题 *</label>
          <input type="text" id="artTitle" placeholder="输入文章标题">
        </div>
        <div class="form-group" style="flex:1">
          <label>分类</label>
          <select id="artCategory">
            <option value="副业项目">副业项目</option>
            <option value="自媒体创作">自媒体创作</option>
            <option value="电商带货">电商带货</option>
            <option value="知识付费">知识付费</option>
            <option value="投资理财">投资理财</option>
            <option value="AI工具">AI工具</option>
            <option value="引流获客">引流获客</option>
            <option value="技能变现">技能变现</option>
            <option value="直播运营">直播运营</option>
            <option value="AIGC">AIGC</option>
            <option value="知识变现">知识变现</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>简介</label>
        <input type="text" id="artSummary" placeholder="文章简介（显示在列表中）">
      </div>
      <div class="form-group">
        <label>正文（支持 HTML）</label>
        <div class="rich-toolbar">
          <button onclick="insertTag('artContent','<p>','</p>')">段落</button>
          <button onclick="insertTag('artContent','<strong>','</strong>')">加粗</button>
          <button onclick="insertTag('artContent','<p style="color:#6366f1;font-weight:bold;">','</p>')">小标题</button>
          <button onclick="insertTag('artContent','<p style="background:#f6ffed;border-left:6rpx solid #52c41a;padding:16rpx 20rpx;border-radius:8rpx;line-height:2;">','</p>')">高亮框</button>
          <button onclick="insertTag('artContent','<br/>','')">换行</button>
        </div>
        <textarea id="artContent" placeholder="文章正文，支持 HTML 标签，如：&lt;p&gt;段落内容&lt;/p&gt;" style="min-height:200px;"></textarea>
        <div class="form-hint">💡 可使用 HTML 标签：&lt;p&gt; &lt;strong&gt; &lt;br/&gt;</div>
      </div>
      <div class="form-group">
        <label>是否免费</label>
        <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="artIsFree" checked style="width:auto;">
          <span style="font-weight:normal;font-size:14px;">免费文章（关闭则为付费内容）</span>
        </label>
      </div>
      <div class="form-group" id="previewGroup" style="display:none;">
        <label>预览</label>
        <div class="preview-box" id="contentPreview"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-success" onclick="previewContent()">👁️ 预览</button>
      <button class="btn-primary" id="saveBtn" onclick="saveArticle()">保 存</button>
    </div>
  </div>
</div>

<!-- 删除确认弹窗 -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <h3>确认删除</h3>
      <button class="modal-close" onclick="closeDeleteModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="confirm-box">
        <p id="deleteConfirmText">确定要删除这篇文章吗？</p>
        <p style="color:#e74c3c;font-size:13px;margin-top:8px;">⚠️ 删除后需等待 GitHub 同步，约 1-2 分钟生效</p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeDeleteModal()">取消</button>
      <button class="btn-danger" onclick="confirmDelete()">确认删除</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 加载遮罩 -->
<div class="loading-mask" id="loadingMask">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">处理中...</div>
</div>

<script>
// ============ 配置 ============
const CONFIG = {
  owner: 'zhangsoar206-arch',
  repo: 'miniprogram-articles',
  branch: 'main',
  token: '',  // 登录后自动填充
  indexUrl: `https://api.github.com/repos/zhangsoar206-arch/miniprogram-articles/contents/api/articles.json`,
  articlesDir: `https://api.github.com/repos/zhangsoar206-arch/miniprogram-articles/contents/articles`,
};

// ============ 状态 ============
let articles = [];
let editingId = null;
let articleShaMap = {};  // id -> sha
let currentDeleteId = null;

// ============ 登录 ============
function doLogin() {
  const pwd = document.getElementById('passwordInput').value.trim();
  if (pwd === 'admin123') {
    sessionStorage.setItem('adminLoggedIn', '1');
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').classList.add('show');
    syncArticles();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

// 检查登录状态
if (sessionStorage.getItem('adminLoggedIn') === '1') {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('adminPage').classList.add('show');
}

function logout() {
  sessionStorage.removeItem('adminLoggedIn');
  location.reload();
}

// ============ Toast ============
function showToast(msg, type = 'default') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show' + (type === 'success' ? ' success' : type === 'error' ? ' error' : '');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function showLoading(text = '处理中...') {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingMask').classList.add('show');
}

function hideLoading() {
  document.getElementById('loadingMask').classList.remove('show');
}

// ============ 刷新文章列表 ============
async function syncArticles() {
  const statusEl = document.getElementById('syncStatus');
  statusEl.textContent = '加载中...';
  try {
    const res = await fetch(CONFIG.indexUrl);
    if (!res.ok) throw new Error('获取索引失败，状态码：' + res.status);
    const data = await res.json();
    const content = JSON.parse(atob(data.content));
    articles = content.articles || [];
    
    // 获取各文章的 SHA
    const dirRes = await fetch(CONFIG.articlesDir);
    if (dirRes.ok) {
      const dirData = await dirRes.json();
      for (const item of dirData) {
        if (item.name.endsWith('.json')) {
          const id = item.name.replace('.json', '');
          articleShaMap[id] = item.sha;
        }
      }
    }
    
    renderList();
    statusEl.textContent = '✅ 已刷新 ' + articles.length + ' 篇';
    setTimeout(() => statusEl.textContent = '', 3000);
  } catch (e) {
    statusEl.textContent = '❌ 加载失败';
    showToast('加载失败：' + e.message, 'error');
  }
}

// ============ 渲染列表 ============
function renderList() {
  const listEl = document.getElementById('articleList');
  document.getElementById('articleCount').textContent = '共 ' + articles.length + ' 篇';
  
  if (articles.length === 0) {
    listEl.innerHTML = '<div class="empty">暂无文章，点击「添加文章」开始</div>';
    return;
  }
  
  const html = articles.map(a => `
    <div class="article-item">
      <div class="article-info">
        <div class="article-title">${escHtml(a.title)}</div>
        <div class="article-meta">
          <span class="meta-tag tag-category">${escHtml(a.category || '未分类')}</span>
          <span class="meta-tag ${a.isFree !== false ? 'tag-free' : 'tag-paid'}">${a.isFree !== false ? '免费' : '付费'}</span>
          <span class="meta-time">${(a.createTime || '').split(' ')[0]}</span>
          <span class="meta-id">${a.id}</span>
        </div>
      </div>
      <div class="article-actions">
        <button class="btn-edit" onclick="openEditModal('${a.id}')">编辑</button>
        <button class="btn-del" onclick="openDeleteModal('${a.id}')">删除</button>
      </div>
    </div>
  `).join('');
  
  listEl.innerHTML = html;
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// ============ 弹窗操作 ============
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '添加文章';
  document.getElementById('saveBtn').textContent = '保存并发布';
  document.getElementById('artTitle').value = '';
  document.getElementById('artCategory').value = '副业项目';
  document.getElementById('artSummary').value = '';
  document.getElementById('artContent').value = '';
  document.getElementById('artIsFree').checked = true;
  document.getElementById('previewGroup').style.display = 'none';
  document.getElementById('articleModal').classList.add('show');
}

function openEditModal(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '编辑文章';
  document.getElementById('saveBtn').textContent = '保存并更新';
  document.getElementById('artTitle').value = a.title || '';
  document.getElementById('artCategory').value = a.category || '副业项目';
  document.getElementById('artSummary').value = a.summary || '';
  document.getElementById('artContent').value = a.content || '';
  document.getElementById('artIsFree').checked = a.isFree !== false;
  document.getElementById('previewGroup').style.display = 'none';
  document.getElementById('articleModal').classList.add('show');
}

function closeModal() {
  document.getElementById('articleModal').classList.remove('show');
}

function openDeleteModal(id) {
  currentDeleteId = id;
  const a = articles.find(x => x.id === id);
  document.getElementById('deleteConfirmText').textContent = '确定要删除《' + (a ? a.title : id) + '》吗？';
  document.getElementById('deleteModal').classList.add('show');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('show');
}

// ============ 富文本工具 ============
function insertTag textareaId, startTag, endTag) {
  const ta = document.getElementById(textareaId);
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const selected = ta.value.substring(start, end);
  const newText = ta.value.substring(0, start) + startTag + selected + endTag + ta.value.substring(end);
  ta.value = newText;
  ta.focus();
  ta.selectionStart = start + startTag.length;
  ta.selectionEnd = start + startTag.length + selected.length;
}

function previewContent() {
  const content = document.getElementById('artContent').value;
  document.getElementById('contentPreview').innerHTML = content || '<span style="color:#999">无内容</span>';
  document.getElementById('previewGroup').style.display = 'block';
}

// ============ 保存文章（新增/更新） ============
async function saveArticle() {
  const title = document.getElementById('artTitle').value.trim();
  if (!title) { showToast('请输入标题', 'error'); return; }
  
  const category = document.getElementById('artCategory').value;
  const summary = document.getElementById('artSummary').value.trim();
  const content = document.getElementById('artContent').value;
  const isFree = document.getElementById('artIsFree').checked;
  
  showLoading('保存中...');
  closeModal();
  
  try {
    if (editingId) {
      // 更新现有文章
      await updateArticle(editingId, { title, category, summary, content, isFree });
    } else {
      // 新增文章
      await addArticle({ title, category, summary, content, isFree });
    }
  } catch (e) {
    hideLoading();
    showToast('保存失败：' + e.message, 'error');
  }
}

function generateId() {
  const d = new Date();
  const pad = n => n < 10 ? '0' + n : '' + n;
  return 'article_' + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '_' + 
         pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
}

function nowStr() {
  const d = new Date();
  const pad = n => n < 10 ? '0' + n : '' + n;
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + 'T' +
         pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

async function addArticle(fields) {
  const id = generateId();
  const now = nowStr();
  const article = {
    id,
    title: fields.title,
    category: fields.category,
    summary: fields.summary,
    content: fields.content,
    isFree: fields.isFree,
    createTime: now,
    updateTime: now
  };
  
  // 1. 写入文章文件
  await putFile('articles/' + id + '.json', article, null);
  
  // 2. 更新索引
  articles.unshift(article);
  await updateIndex();
  
  hideLoading();
  showToast('✅ 文章已发布！ID: ' + id, 'success');
  renderList();
}

async function updateArticle(id, fields) {
  const idx = articles.findIndex(a => a.id === id);
  if (idx === -1) throw new Error('文章不存在');
  
  const existing = articles[idx];
  const updated = {
    ...existing,
    ...fields,
    id,
    updateTime: nowStr()
  };
  
  // 1. 更新文章文件
  await putFile('articles/' + id + '.json', updated, articleShaMap[id]);
  
  // 2. 更新索引
  articles[idx] = updated;
  await updateIndex();
  
  hideLoading();
  showToast('✅ 文章已更新', 'success');
  renderList();
}

// ============ 删除文章 ============
async function confirmDelete() {
  if (!currentDeleteId) return;
  const id = currentDeleteId;
  closeDeleteModal();
  showLoading('删除中...');
  
  try {
    // 1. 删除文章文件
    await deleteFile('articles/' + id + '.json', articleShaMap[id]);
    
    // 2. 从索引移除
    articles = articles.filter(a => a.id !== id);
    delete articleShaMap[id];
    await updateIndex();
    
    hideLoading();
    showToast('✅ 已删除', 'success');
    renderList();
  } catch (e) {
    hideLoading();
    showToast('删除失败：' + e.message, 'error');
  }
}

// ============ GitHub API 操作 ============
async function putFile(path, content, sha) {
  const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`;
  const body = { message: '更新文章: ' + (content.title || path), content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))) };
  if (sha) body.sha = sha;
  
  const res = await fetch(url, {
    method: 'PUT',
    headers: { 'Authorization': 'token ' + CONFIG.token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || 'GitHub API 错误');
  }
  return res.json();
}

async function deleteFile(path, sha) {
  const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`;
  const res = await fetch(url, {
    method: 'DELETE',
    headers: { 'Authorization': 'token ' + CONFIG.token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: '删除文章: ' + path, sha })
  });
  
  if (!res.ok && res.status !== 204) {
    const err = await res.json();
    throw new Error(err.message || 'GitHub API 错误');
  }
}

async function updateIndex() {
  // 获取索引当前 SHA
  const idxRes = await fetch(CONFIG.indexUrl);
  if (!idxRes.ok) throw new Error('获取索引SHA失败');
  const idxData = await idxRes.json();
  
  await putFile('api/articles.json', { articles }, idxData.sha);
}
